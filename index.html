<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eksamens projekt spejlet</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Webcam starter her -->
    <video id="webcam" autoplay playsinline muted></video>
    <div class="content">
      <h1 id="inaktivTekst">Træd tættere på og se dig selv i øjnene</h1>
    </div>

    <!-- Quizzen starter her -->

    <div class="quiz">
      <h2 id="spoergsmaalTekst"></h2>
      <div id="svarBobler"></div>

      <input type="text" id="egetSvar" placeholder="Skriv dit eget svar" />
      <button id="egetSvarBoble">Send</button>
    </div>

    <!--Her kommer wordcloud-->
    <div class="wordcloud" id="wordcloudId">
      <h2>Du er aldrig alene - mange andre har det ligesom dig</h2>
      <div class="wordcloudContainer" id="wordcloudContainerId"></div>
      <!--Her laver vi lige en ryd wordcloud knap, så vi kan rydde dens mens vi arbejder på den-->
      <button class="resetKnap" id="resetKnapId">Ryd wordcloud</button>
    </div>

    <script src="js/quiz.js"></script>
  </body>
</html>
